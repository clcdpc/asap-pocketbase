openapi: 3.0.3
info:
  title: ASAP API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /title-requests:
    get:
      summary: List title requests
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: libraryOrgId
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: List of title requests
  /title-requests/{id}/reject:
    post:
      summary: Reject a title request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [closeReason, staffUserId]
              properties:
                closeReason: { type: string }
                closeMessage: { type: string, nullable: true }
                staffUserId: { type: string }
      responses:
        '204':
          description: Rejected
        '400':
          description: Validation error
  /jobs/outstanding-timeout/run:
    post:
      summary: Run outstanding timeout processor immediately
      responses:
        '200':
          description: Number of updated records
