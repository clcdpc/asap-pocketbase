<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link id="app-icon" rel="icon" type="image/png" href="" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Suggestion</title>
  <meta name="description" content="Suggest a purchase for your library. Log in with your library card to submit a material suggestion.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.css">
  <style>
    body { padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .hidden { display: none !important; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .form-group label { text-align: right; font-weight: bold; }
    .reqAuth label { padding-top: 7px; }

    /* Accessibility Overrides */
    .btn-primary { background-color: #0056b3; border-color: #004a9b; }
    .btn-primary:hover, .btn-primary:focus, .btn-primary:active { background-color: #004085; border-color: #003366; }
    .text-muted { color: #5a6268 !important; }
    .btn-logout.text-muted { color: #495057 !important; text-decoration: underline; }
    .btn-logout.text-muted:hover { color: #212529 !important; }
    .fa-check-circle { color: #1e7e34 !important; } /* Darker green */
    .fa-exclamation-triangle { color: #856404 !important; } /* High contrast warning */
  </style>
</head>
<body>
<main class="container" style="max-width: 600px; margin: 0 auto;">
  <div style="text-align: center; margin-bottom: 20px;">
    <img id="nav-logo" class="hidden" alt="Library Logo" style="height: 60px;">
    <h1 id="main-title" class="h4 mt-2">Material Suggestion</h1>
  </div>
  
  <div id="status-announcer" class="sr-only" aria-live="assertive"></div>
  
  <div id="step-login">
    <div class="form-group row">
      <div class="col-5"></div>
      <div class="col-7" id="ui-login-prompt"></div>
    </div>
    
    <form id="login-form" aria-labelledby="ui-login-prompt">
      <div class="form-group row">
        <label id="lbl-barcode-login" for="barcode" class="col-5 col-form-label">Library Card</label>
        <div class="col-7">
          <div class="input-group">
            <div class="input-group-prepend">
              <div class="input-group-text"><i class="fa fa-address-card" aria-hidden="true"></i></div>
            </div>
            <input id="barcode" name="username" type="text" class="form-control" required="required" aria-required="true">
          </div>
        </div>
      </div>
      <div class="form-group row">
        <label id="lbl-pin-login" for="pin" class="col-5 col-form-label">Pin</label>
        <div class="col-7">
          <input id="pin" name="password" type="password" required="required" class="form-control" aria-required="true">
        </div>
      </div>
      <div class="form-group row reqAuth">
        <div class="col-5"></div>
        <div class="col-7" style="text-align: left;" id="ui-login-note-container" aria-live="polite"></div>
      </div>
      <div class="form-group row">
        <div class="offset-5 col-7">
          <button type="submit" class="btn btn-primary" id="login-btn">Next</button>
          <div id="login-error" class="text-danger mt-2 font-weight-bold hidden" aria-live="assertive">Incorrect Login - Please try again</div>
        </div>
      </div>
    </form>
  </div>

  <div id="step-form" class="hidden">
    <h2 class="h5" tabindex="-1">Suggestion Details</h2>
    <form id="suggestion-form" aria-label="Suggestion Details">
      <div class="form-group row">
        <label id="lbl-barcode-display" for="display-barcode" class="col-5 col-form-label">Library Card</label>
        <div class="col-7" style="display: flex; align-items: center; justify-content: space-between;">
          <span id="display-barcode"></span>
          <a href="#" class="btn-logout small text-muted">Logout / Switch User</a>
        </div>
      </div>
      <div class="form-group row">
        <label for="display-email" class="col-5 col-form-label">Email</label>
        <div class="col-7" style="display: flex; align-items: center;">
          <div id="no-email-msg" class="hidden text-muted small"></div>
          <span id="display-email"></span>
        </div>
      </div>
      <div id="pickup-branch-container" class="form-group row hidden">
        <label for="display-pickup-branch" class="col-5 col-form-label">Pickup Location</label>
        <div class="col-7" style="display: flex; align-items: center;">
          <span id="display-pickup-branch"></span>
        </div>
      </div>
      <div class="form-group row reqAuth">
        <label for="format" class="col-5 col-form-label">Format <span aria-hidden="true">*</span></label>
        <div class="col-7">
          <select id="format" name="format" class="custom-select" required aria-required="true">
            <option value="book">Book</option>
            <option value="audiobook_cd">Audiobook (Physical CD)</option>
            <option value="dvd">DVD</option>
            <option value="music_cd">Music CD</option>
            <option value="ebook">eBook</option>
            <option value="eaudiobook">eAudiobook</option>
          </select>
        </div>
      </div>

      <div id="common-author-container" class="form-group row hidden">
        <label for="common-author" class="col-5 col-form-label">Check Popular Authors</label>
        <div class="col-7">
          <select id="common-author" class="custom-select">
            <option value="">-- Select an Author --</option>
          </select>
          <small class="form-text text-muted">See if this is an author we already collect.</small>
        </div>
      </div>

      <div id="common-author-msg-container" class="alert alert-info hidden mb-4">
        <div id="common-author-msg"></div>
      </div>

      <div id="physical-fields">
        <div class="form-group row reqAuth" id="field-author">
          <label for="author" class="col-5 col-form-label" id="lbl-creator">Author <span aria-hidden="true">*</span></label>
          <div class="col-7">
            <input id="author" name="author" type="text" class="form-control" required="required" aria-required="true">
          </div>
        </div>
        <div class="form-group row reqAuth" id="field-title">
          <label for="title" class="col-5 col-form-label" id="lbl-title">Title <span aria-hidden="true">*</span></label>
          <div class="col-7">
            <input id="title" name="title" type="text" class="form-control" required="required" aria-required="true">
          </div>
        </div>
        <div class="form-group row reqAuth" id="field-identifier">
          <label for="isbn" class="col-5 col-form-label" id="lbl-identifier">ISBN</label>
          <div class="col-7">
            <!-- name="isbn" is mapped to the "identifier" DB field by the backend (records.js, format_rules.js) -->
            <input id="isbn" name="isbn" type="text" class="form-control">
          </div>
        </div>
        <div class="form-group row reqAuth" id="field-agegroup">
          <label for="agegroup" class="col-5 col-form-label" id="lbl-agegroup">Age Group <span aria-hidden="true">*</span></label>
          <div class="col-7">
            <select id="agegroup" name="agegroup" class="custom-select" required aria-required="true">
            </select>
          </div>
        </div>
        <div class="form-group row reqAuth" id="field-publication">
          <label for="publication" class="col-5 col-form-label" id="lbl-publication">Publication Timing <span aria-hidden="true">*</span></label>
          <div class="col-7">
            <select id="publication" name="publication" class="custom-select publication-options-select" required aria-required="true">
              <option value="Already published">Already published</option>
              <option value="Coming soon">Coming soon</option>
              <option value="Published a while back">Published a while back</option>
            </select>
          </div>
        </div>
        <div class="form-group row reqAuth">
          <label for="ui-note-text" class="col-5">Note</label>
          <div class="col-7" id="ui-note-text" tabindex="0"></div>
        </div>
        <div class="form-group row">
          <div class="offset-5 col-7">
            <button type="button" class="btn btn-outline-secondary btn-cancel mr-2">Reset</button>
            <button type="submit" class="btn btn-primary" id="submit-btn">Submit</button>
            <div id="submit-error" class="text-danger mt-2 font-weight-bold hidden" aria-live="assertive"></div>
          </div>
        </div>
      </div>

      <div id="econtent-fields" class="hidden">
        <div class="form-group row">
          <div class="offset-5 col-7" id="econtent-msg-container"></div>
        </div>
      </div>
    </form>
  </div>

  <div id="step-success" class="hidden" role="status" aria-labelledby="success-title">
    <div class="row">
      <div class="col-5 text-right">
        <i class="fa fa-check-circle" style="color: #28a745; font-size: 3rem;" aria-hidden="true"></i>
      </div>
      <div class="col-7">
        <h2 id="success-title" class="h5" tabindex="-1">Suggestion Submitted</h2>
        <div id="success-body" class="mb-2"></div>
        <div class="mb-2">
          <button type="button" class="btn btn-primary btn-submit-another mr-2">Submit another suggestion</button>
          <button type="button" class="btn btn-outline-secondary btn-logout">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <div id="step-conflict" class="hidden" role="alert" aria-labelledby="conflict-title">
    <div class="row">
      <div class="col-5 text-right">
        <i class="fa fa-exclamation-triangle" style="color: #ffc107; font-size: 3rem;" aria-hidden="true"></i>
      </div>
      <div class="col-7">
        <h2 id="conflict-title" class="h5" tabindex="-1">Already Submitted</h2>
        <div id="conflict-body" class="mb-2"></div>
        <div class="mb-2">
          <button type="button" class="btn btn-primary btn-submit-another mr-2">Submit another suggestion</button>
          <button type="button" class="btn btn-outline-secondary btn-logout">Logout</button>
        </div>
      </div>
    </div>
  </div>

</main>

<script src="app.js?v=20260425-format-rules" type="module"></script>
</body>
</html>
